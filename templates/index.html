<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - YourWork</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/">YourWork</a>
        </div>
        <div class="navbar-menu">
            <a href="/">首页</a>
            <a href="/projects">项目</a>
            <a href="/messages">消息</a>
            <a href="/admin/users" id="admin-link" style="display: none;">用户管理</a>
            <span id="user-info" class="user-info"></span>
            <a href="#" onclick="logout()">退出</a>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>仪表盘</h1>
            <p class="text-muted">欢迎回来，<span id="user-name"></span>！</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="project-count">-</div>
                <div class="stat-label">进行中项目</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="milestone-count">-</div>
                <div class="stat-label">待完成里程碑</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="message-count">-</div>
                <div class="stat-label">未读消息</div>
            </div>
        </div>

        <!-- 最近项目 -->
        <section class="content-section">
            <div class="section-header">
                <h2>最近项目</h2>
                <a href="/projects" class="btn btn-secondary">查看全部</a>
            </div>
            <div id="project-list" class="project-grid">
                <div class="loading">加载中...</div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        let current_user = null;
        let is_admin = false;

        document.addEventListener('DOMContentLoaded', async function() {
            console.log('[INFO] 页面加载完成，开始初始化');
            await init_app();
            await load_dashboard();
        });

        async function init_app() {
            const result = await api_get('/auth/profile');
            if (result.code === 0) {
                current_user = result.data;
                is_admin = check_is_admin(current_user.roles || []);
                console.log('[INFO] 用户登录成功:', current_user.username);

                document.getElementById('user-info').textContent = current_user.display_name || current_user.username;
                document.getElementById('user-name').textContent = current_user.display_name || current_user.username;

                if (is_admin) {
                    document.getElementById('admin-link').style.display = 'inline-block';
                }
            } else {
                window.location.href = '/login';
            }
        }

        function check_is_admin(roles) {
            return roles.some(function(r) {
                return r.code === 'ADMIN' || r.code === 'SYSTEM_ADMIN';
            });
        }

        async function load_dashboard() {
            console.log('[INFO] 加载仪表盘数据');

            try {
                // 加载项目列表
                const project_result = await api_get('/projects?page_size=6');
                if (project_result.code === 0) {
                    const projects = project_result.data.items;
                    document.getElementById('project-count').textContent = project_result.data.total;
                    render_projects(projects);
                }

                // 加载未读消息数
                const message_result = await api_get('/messages/unread-count');
                if (message_result.code === 0) {
                    document.getElementById('message-count').textContent = message_result.data.unread_count;
                }

                // 待完成里程碑数（简化处理，显示项目数）
                document.getElementById('milestone-count').textContent = '-';

                console.log('[INFO] 仪表盘数据加载完成');
            } catch (e) {
                console.log('[ERROR] 数据加载失败:', e);
            }
        }

        function render_projects(projects) {
            const container = document.getElementById('project-list');

            if (projects.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无项目，<a href="/projects/create">创建第一个项目</a></div>';
                return;
            }

            container.innerHTML = projects.map(function(p) {
                const status_class = get_status_class(p.status);
                const status_text = get_status_text(p.status);

                return `
                    <div class="project-card" onclick="location.href='/projects/${p.id}'">
                        <div class="project-card-header">
                            <h3>${escape_html(p.name)}</h3>
                            <span class="status-badge ${status_class}">${status_text}</span>
                        </div>
                        <p class="project-card-no">编号: ${escape_html(p.project_no)}</p>
                        <p class="project-card-time">创建于: ${format_date(p.created_at)}</p>
                    </div>
                `;
            }).join('');
        }

        function get_status_class(status) {
            const classes = {
                'in_progress': 'status-in-progress',
                'completed': 'status-completed',
                'ignored': 'status-paused'
            };
            return classes[status] || '';
        }

        function get_status_text(status) {
            const texts = {
                'in_progress': '进行中',
                'completed': '已完成',
                'ignored': '已挂起'
            };
            return texts[status] || status;
        }

        function escape_html(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function format_date(date_str) {
            if (!date_str) return '';
            const date = new Date(date_str);
            return date.toLocaleString('zh-CN');
        }

        async function logout() {
            if (confirm('确定要退出登录吗？')) {
                await api_post('/auth/logout');
                window.location.href = '/login';
            }
        }
    </script>
</body>
</html>
