<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - YourWork</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/">YourWork</a>
        </div>
        <div class="navbar-menu">
            <a href="/">首页</a>
            <a href="/projects">项目</a>
            <a href="/messages">消息</a>
            <a href="/admin/users" id="admin-link" style="display: none;">用户管理</a>
            <span id="user-info" class="user-info"></span>
            <a href="#" onclick="logout()">退出</a>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>消息中心</h1>
            <div class="page-header-actions">
                <span id="unread-count" class="unread-badge">0 条未读</span>
                <button class="btn btn-secondary" onclick="mark_all_read()">全部已读</button>
            </div>
        </div>

        <!-- 筛选 -->
        <div class="filter-bar">
            <div class="filter-group">
                <select id="message-filter" class="form-select" onchange="filter_messages()">
                    <option value="">全部消息</option>
                    <option value="unread">未读</option>
                    <option value="read">已读</option>
                </select>
            </div>
        </div>

        <!-- 消息列表 -->
        <div id="message-list" class="message-list">
            <div class="loading">加载中...</div>
        </div>

        <!-- 分页 -->
        <div id="pagination" class="pagination"></div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        let current_user = null;
        let is_admin = false;
        let current_page = 1;
        let page_size = 20;
        let total_pages = 1;

        document.addEventListener('DOMContentLoaded', async function() {
            console.log('[INFO] 消息中心页面加载完成');
            await init_app();
            await load_messages();
            await load_unread_count();
        });

        async function init_app() {
            const result = await api_get('/auth/profile');
            if (result.code === 0) {
                current_user = result.data;
                is_admin = check_is_admin(current_user.roles || []);
                console.log('[INFO] 用户登录成功:', current_user.username);

                document.getElementById('user-info').textContent = current_user.display_name || current_user.username;

                if (is_admin) {
                    document.getElementById('admin-link').style.display = 'inline-block';
                }
            } else {
                window.location.href = '/login';
            }
        }

        function check_is_admin(roles) {
            return roles.some(function(r) {
                return r.code === 'ADMIN' || r.code === 'SYSTEM_ADMIN';
            });
        }

        async function load_messages(page) {
            if (page) {
                current_page = page;
            }

            console.log('[INFO] 加载消息列表，第' + current_page + '页');

            const filter = document.getElementById('message-filter').value;
            const params = [];
            params.push('page=' + current_page);
            params.push('page_size=' + page_size);

            if (filter === 'unread') {
                params.push('is_read=0');
            } else if (filter === 'read') {
                params.push('is_read=1');
            }

            const params_str = '?' + params.join('&');

            try {
                const result = await api_get('/messages' + params_str);
                if (result.code === 0) {
                    const data = result.data;
                    render_messages(data.items);
                    render_pagination(data.total, data.page, data.page_size);
                } else {
                    console.log('[WARNING] 加载消息失败:', result.message);
                }
            } catch (e) {
                console.log('[ERROR] 加载消息异常:', e);
            }
        }

        async function load_unread_count() {
            try {
                const result = await api_get('/messages/unread-count');
                if (result.code === 0) {
                    const count = result.data.unread_count;
                    document.getElementById('unread-count').textContent = count + ' 条未读';
                }
            } catch (e) {
                console.log('[ERROR] 加载未读数异常:', e);
            }
        }

        function render_messages(messages) {
            const container = document.getElementById('message-list');

            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无消息</div>';
                return;
            }

            container.innerHTML = messages.map(function(m) {
                const is_read = m.is_read ? 'read' : 'unread';
                const type_class = 'message-type-' + m.type;

                return `
                    <div class="message-item message-item-${is_read}" onclick="view_message('${m.id}')">
                        <div class="message-header">
                            <span class="message-type ${type_class}">${get_type_text(m.type)}</span>
                            <span class="message-time">${format_date(m.created_at)}</span>
                        </div>
                        <h3 class="message-title">${escape_html(m.title)}</h3>
                        ${m.content ? '<p class="message-content">' + escape_html(m.content) + '</p>' : ''}
                    </div>
                `;
            }).join('');
        }

        function render_pagination(total, page, pageSize) {
            total_pages = Math.ceil(total / pageSize);
            const container = document.getElementById('pagination');

            if (total_pages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '<div class="pagination-info">共 ' + total + ' 条消息，第 ' + page + '/' + total_pages + ' 页</div>';
            html += '<div class="pagination-pages">';

            if (page > 1) {
                html += '<button class="btn btn-secondary" onclick="load_messages(' + (page - 1) + ')">上一页</button>';
            }

            for (let i = 1; i <= total_pages; i++) {
                if (i === page) {
                    html += '<button class="btn btn-primary disabled">' + i + '</button>';
                } else if (i === 1 || i === total_pages || Math.abs(i - page) <= 2) {
                    html += '<button class="btn btn-secondary" onclick="load_messages(' + i + ')">' + i + '</button>';
                } else if (Math.abs(i - page) === 3) {
                    html += '<span>...</span>';
                }
            }

            if (page < total_pages) {
                html += '<button class="btn btn-secondary" onclick="load_messages(' + (page + 1) + ')">下一页</button>';
            }

            html += '</div>';
            container.innerHTML = html;
        }

        async function filter_messages() {
            load_messages(1);
        }

        async function view_message(message_id) {
            // 标记为已读
            try {
                await api_put('/messages/' + message_id + '/read');
                await load_messages();
                await load_unread_count();
            } catch (e) {
                console.log('[ERROR] 标记已读异常:', e);
            }
        }

        async function mark_all_read() {
            if (!confirm('确定要将所有消息标记为已读吗？')) {
                return;
            }

            try {
                const result = await api_put('/messages/read-all');
                if (result.code === 0) {
                    show_message('已标记 ' + result.data.count + ' 条消息为已读', 'success');
                    await load_messages();
                    await load_unread_count();
                } else {
                    show_message(result.message, 'error');
                }
            } catch (e) {
                console.log('[ERROR] 标记已读异常:', e);
            }
        }

        async function api_put(endpoint, data) {
            const url = '/api/v1' + endpoint;
            console.log('[INFO] PUT ' + url, data);

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data || {})
                });
                return await response.json();
            } catch (e) {
                console.log('[ERROR] PUT 请求失败:', url, e);
                throw e;
            }
        }

        function get_type_text(type) {
            const texts = {
                'milestone': '里程碑',
                'project': '项目',
                'system': '系统'
            };
            return texts[type] || type;
        }

        function escape_html(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function format_date(date_str) {
            if (!date_str) return '';
            const date = new Date(date_str);
            return date.toLocaleString('zh-CN');
        }

        function show_message(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(function() {
                toast.classList.add('show');
            }, 10);

            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() {
                    container.removeChild(toast);
                }, 300);
            }, 3000);
        }

        async function logout() {
            if (confirm('确定要退出登录吗？')) {
                await api_post('/auth/logout');
                window.location.href = '/login';
            }
        }
    </script>
</body>
</html>
