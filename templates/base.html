<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YourWork{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/">YourWork</a>
        </div>
        <div class="navbar-menu">
            <a href="/">首页</a>
            <a href="/projects">项目</a>
            <a href="/messages">消息</a>
            {% if is_admin %}
            <a href="/admin/users">用户管理</a>
            {% endif %}
            <span id="user-info" class="user-info"></span>
            <a href="#" onclick="logout()">退出</a>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- 消息提示组件 -->
    <div id="toast-container" class="toast-container"></div>

    <!-- JavaScript -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        // 全局变量
        let current_user = null;
        let is_admin = false;

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('[INFO] 页面加载完成，开始初始化');
            await init_app();
            {% block page_init %}{% endblock %}
        });

        // 应用初始化
        async function init_app() {
            // 检查登录状态
            const result = await api_get('/auth/profile');
            if (result.code === 0) {
                current_user = result.data;
                is_admin = check_is_admin(current_user.roles || []);
                console.log('[INFO] 用户登录成功:', current_user.username);

                // 显示用户信息
                const user_info_el = document.getElementById('user-info');
                if (user_info_el) {
                    user_info_el.textContent = current_user.display_name || current_user.username;
                }
            } else {
                console.log('[INFO] 未登录');
                // 如果不是登录页面，跳转到登录页
                if (!window.location.pathname.includes('/login')) {
                    window.location.href = '/login';
                }
            }
        }

        // 检查是否是管理员
        function check_is_admin(roles) {
            return roles.some(function(r) {
                return r.code === 'ADMIN' || r.code === 'SYSTEM_ADMIN';
            });
        }

        // 退出登录
        async function logout() {
            if (confirm('确定要退出登录吗？')) {
                await api_post('/auth/logout');
                window.location.href = '/login';
            }
        }

        // 显示消息提示
        function show_message(message, type) {
            type = type || 'info';
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(function() {
                toast.classList.add('show');
            }, 10);

            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() {
                    container.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 格式化日期
        function format_date(date_str) {
            if (!date_str) return '';
            const date = new Date(date_str);
            return date.toLocaleString('zh-CN');
        }

        // 格式化文件大小
        function format_file_size(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 暴露到全局
        window.current_user = current_user;
        window.is_admin = is_admin;
        window.show_message = show_message;
        window.format_date = format_date;
        window.format_file_size = format_file_size;
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
